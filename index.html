<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RNGdle Infinite</title>
    <script src="https://cdn.jsdelivr.net/tailwindjs"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-white flex min-h-[100dvh] flex-col items-center justify-start p-4 md:p-8 select-none">

    <!-- Center View Game Wrapper -->
    <main class="w-full max-w-xl flex flex-col items-center text-center space-y-6">
        
        <!-- Thick Number Target Capsule Frame -->
        <div class="w-full flex justify-center pt-4">
            <div id="number-frame" class="number-box px-12 py-4">
                <span id="rolled-display" class="text-4xl md:text-5xl font-extrabold font-mono tracking-wider text-white">
                    000000
                </span>
            </div>
        </div>

        <!-- Meta Sub-header Info Metrics Line -->
        <div id="meta-row" class="flex items-center justify-center space-x-2 text-xs font-mono opacity-0 transition-opacity duration-500">
            <span id="card-rank-badge" class="font-bold tracking-widest uppercase">COMMON</span>
            <span class="text-gray-600">•</span>
            <span id="percentile-display" class="text-amber-500 uppercase font-bold tracking-wider">BOTTOM 24%</span>
        </div>

        <!-- EP Counter Aggregation Metrics -->
        <div id="ep-block" class="flex flex-col items-center space-y-1 opacity-0 transition-opacity duration-500">
            <div class="pill-badge px-4 py-1 text-sm font-mono font-bold tracking-wide" id="total-ep-display">
                0 EP
            </div>
            <div class="text-[10px] font-mono tracking-widest text-gray-500 uppercase pt-1">Your Lifetime EP</div>
        </div>

        <!-- Action Activation Buttons -->
        <div class="w-full flex flex-col items-center gap-3">
            <button id="roll-btn" class="w-full max-w-xs bg-gradient-to-r from-purple-600 to-pink-600 hover:brightness-110 active:scale-[0.98] text-white font-bold font-mono py-3 px-6 rounded-xl transition-all tracking-wider uppercase text-xs btn-glow">
                🎰 Generate Roll
            </button>
        </div>

        <!-- Text Adjective Subtitle Element -->
        <div id="adjective-phrase" class="text-xs text-gray-500 font-mono italic lowercase tracking-wide min-h-[18px]"></div>

        <!-- Structural Header Separator Panel Section -->
        <div id="breakdown-header" class="w-full flex flex-col items-center space-y-1 pt-2 opacity-0 transition-opacity duration-300">
            <h2 class="text-sm font-extrabold font-mono tracking-widest uppercase text-white">Badge Breakdown</h2>
            <div id="badge-count" class="text-[10px] font-mono tracking-wider text-gray-500 uppercase">0 Badges Earned</div>
        </div>

        <!-- Chronological Sequential List Feed Container -->
        <div id="badges-container" class="w-full flex flex-col space-y-3 text-left pb-12"></div>

    </main>

    <!-- Connect Components Scripts -->
    <script src="badges.js"></script>
    <script src="engine.js"></script>
    <script src="app.js"></script>
</body>
</html>
