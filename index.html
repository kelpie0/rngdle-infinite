<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RNGdle Infinite</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#050505] antialiased min-h-screen text-gray-100 py-6 px-4 sm:px-8 selection:bg-amber-500/30 overflow-x-hidden w-full max-w-[100vw]">

    <header class="w-full max-w-[1400px] mx-auto flex justify-between items-center mb-6 relative z-30">
        <div id="auto-roll-toggle" class="flex items-center gap-2 cursor-pointer select-none group">
            <span id="auto-roll-dice" class="text-xl transition-all duration-500 ease-out">🎲</span>
            <span class="font-mono text-xs font-bold tracking-[0.3em] text-gray-400 uppercase hidden sm:inline">Infinite RNGdle</span>
        </div>
        
        <button id="view-all-badges-btn" class="fixed top-4 right-4 z-50 px-4 py-2 font-mono text-xs font-bold uppercase text-gray-400 bg-gray-900/80 border border-gray-800 rounded-xl backdrop-blur-md transition-all duration-200 hover:scale-[1.05] hover:text-white hover:border-gray-700 shadow-lg cursor-pointer">
            📁 Badges
        </button>
    </header>

    <!-- Fixed Layout Wrapper: Centers content vertically on small screens, side-by-side on lg+ -->
    <div class="flex flex-col lg:flex-row gap-8 w-full max-w-[1400px] mx-auto justify-center items-center lg:items-start">
        
        <!-- Left Side: Leaderboard Panel -->
        <aside class="w-full max-w-md lg:max-w-none lg:w-64 xl:w-72 shrink-0 space-y-4 lg:sticky lg:top-10 mb-8 lg:mb-0">
            <div class="flex items-center gap-3 border-b border-gray-800 pb-3">
                <span class="text-2xl drop-shadow-[0_0_10px_rgba(251,191,36,0.5)]">🏆</span>
                <h3 class="font-mono font-bold tracking-[0.2em] uppercase text-gray-300 text-sm">Top 5 Rolls</h3>
            </div>
            <div id="leaderboard-container" class="flex flex-col space-y-3 min-h-[120px] xl:min-h-[400px] pb-2">
                <div class="text-[10px] font-mono text-gray-600 text-center mt-6 xl:mt-10 uppercase tracking-widest">Awaiting First Roll...</div>
            </div>
            <button id="show-top-10-btn" class="hidden text-[10px] font-mono font-bold text-gray-500 hover:text-white uppercase tracking-widest transition-colors cursor-pointer w-full text-left pl-1 pb-2">
                Show top 10 rolls ↗
            </button>
        </aside>

        <!-- Center: Main Gameplay Core (Added mx-auto to ensure it never shifts left) -->
        <main class="w-full max-w-2xl flex flex-col items-center flex-1 z-10 mx-auto">
            
            <!-- EXP / Level Bar -->
            <div class="w-full max-w-sm mx-auto mb-6 flex flex-col items-center">
                <div class="w-full flex justify-between items-end mb-1.5 px-2">
                    <span id="level-display" class="font-mono text-sm font-bold text-amber-400 drop-shadow-[0_0_8px_rgba(251,191,36,0.6)] tracking-widest transition-all duration-300">LVL 1</span>
                    <span id="exp-display" class="font-mono text-[10px] text-gray-500 tracking-wider">0 / 50</span>
                </div>
                <div class="w-full h-1.5 bg-gray-900 rounded-full overflow-hidden border border-white/5 relative shadow-inner">
                    <div id="exp-bar-fill" class="h-full bg-gradient-to-r from-amber-600 via-amber-400 to-yellow-300 w-0 transition-all duration-500 ease-out shadow-[0_0_10px_rgba(251,191,36,1)] relative">
                        <div class="absolute right-0 top-0 bottom-0 w-6 bg-white/60 blur-[3px]"></div>
                    </div>
                </div>
            </div>

            <!-- Number Capsule: Added pl-[0.15em] to perfectly balance the tracking! -->
            <div class="mb-10 w-full flex justify-center relative group">
                <div class="absolute inset-0 bg-blue-500/10 blur-3xl rounded-full scale-110 opacity-0 transition-opacity duration-1000" id="capsule-glow"></div>
                <div id="number-frame" class="number-capsule-frame relative z-10 flex justify-center items-center">
                    <span id="number-display" class="text-5xl sm:text-6xl md:text-7xl font-bold font-mono tracking-[0.15em] pl-[0.15em] text-white drop-shadow-md">000000</span>
                </div>
            </div>

            <div id="meta-row" class="flex items-center justify-center space-x-3 text-xs font-mono font-bold tracking-[0.2em] mb-6 opacity-0 transition-all duration-500 translate-y-2">
                <span id="rank-tag" class="px-3 py-1 rounded-full bg-white/5 border border-white/10 text-gray-400 backdrop-blur-sm">COMMON</span>
                <span class="text-gray-600">✦</span>
                <span id="percent-tag" class="text-amber-400 px-3 py-1 bg-amber-500/10 border border-amber-500/20 rounded-full">BOTTOM 24%</span>
            </div>

            <div id="score-wrapper" class="flex flex-col items-center space-y-2 mb-8 opacity-0 transition-all duration-500 translate-y-2">
                <div class="bg-gray-900/80 backdrop-blur-md border border-gray-700/50 px-6 py-2 rounded-full text-sm font-mono font-bold tracking-widest text-white shadow-lg" id="current-ep-counter">0 EP</div>
                <div id="lifetime-ep-counter" class="text-[10px] font-mono tracking-[0.25em] text-gray-500 uppercase font-semibold">0 Total Lifetime EP</div>
            </div>

            <div class="flex items-center justify-center gap-4 w-full mb-12">
                <button id="roll-btn" class="polished-button-primary relative overflow-hidden group">
                    <span class="relative z-10 flex items-center gap-2">
                        <span class="text-xl">🎰</span> Generate Roll
                    </span>
                    <div class="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out"></div>
                </button>
                <button id="share-btn" class="polished-button-primary share-button hidden relative overflow-hidden group px-6">
                    <span class="relative z-10 flex items-center gap-2">
                        <span class="text-xl">📤</span> Share
                    </span>
                    <div class="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out"></div>
                </button>
            </div>

            <div id="feed-wrapper" class="w-full flex flex-col items-center space-y-3 opacity-0 transition-all duration-500">
                <div class="flex items-center gap-4 w-full mb-2">
                    <div class="h-px bg-gradient-to-r from-transparent via-gray-700 to-transparent flex-1"></div>
                    <h2 class="text-xs font-bold font-mono tracking-[0.3em] uppercase text-gray-400">Analysis Breakdown</h2>
                    <div class="h-px bg-gradient-to-r from-transparent via-gray-700 to-transparent flex-1"></div>
                </div>
                <div id="earned-counter-label" class="text-[10px] font-mono tracking-[0.2em] text-gray-500 uppercase pb-6">0 Badges Earned</div>
                <div id="badges-output-stack" class="w-full flex flex-col space-y-4 pb-20"></div>
            </div>
        </main>

        <!-- Right Side: Auto-Skip Controls -->
        <div class="w-full max-w-md lg:max-w-none lg:w-64 xl:w-72 shrink-0 space-y-4 lg:sticky lg:top-10">
            <div class="flex items-center gap-3 border-b border-gray-800 pb-3">
                <span class="text-xl">⚡</span>
                <h3 class="font-mono font-bold tracking-[0.2em] uppercase text-gray-300 text-sm">Auto-Skips</h3>
            </div>
            
            <div class="bg-gradient-to-b from-[#111114] to-[#0a0a0c] border border-white/5 rounded-xl p-4 shadow-inner">
                <div id="autoskip-container" class="flex flex-col space-y-3">
                    <!-- Dynamic toggles -->
                </div>
            </div>
        </div>
    </div>

    <!-- Main Blur Overlay -->
    <div id="modal-screen-blur" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md z-40 transition-opacity duration-300"></div>

    <!-- Center Universal Scrollable Popups -->
    <div id="center-dashboard-modal" class="hidden fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-full max-w-xl max-h-[80vh] bg-gradient-to-b from-gray-900 via-gray-950 to-black border border-white/10 rounded-2xl shadow-2xl z-50 p-6 flex flex-col transition-all duration-300">
        <div class="flex justify-between items-center border-b border-gray-800 pb-4 mb-4">
            <h3 id="dashboard-modal-title" class="font-mono font-bold tracking-[0.2em] uppercase text-sm text-white">All Badges</h3>
            <button id="close-dashboard-btn" class="text-gray-500 hover:text-white font-mono text-xs uppercase px-2 py-1 rounded bg-white/5 border border-white/5 transition-colors">Close</button>
        </div>
        <div id="dashboard-modal-body" class="overflow-y-auto pr-2 flex-1 scrollbar-thin scrollbar-thumb-gray-800"></div>
    </div>

    <script src="badges.js"></script>
    <script src="engine.js"></script>
    <script src="app.js"></script>
</body>
</html>
